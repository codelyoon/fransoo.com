<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fransoo.com</title>
  <style>
    body {
      background: black;
      color: #fff;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 40px;
      line-height: 1.6;
      overflow: hidden;
      position: relative;
      min-height: 100vh;
    }
 .container {
      max-width: 600px;
      position: relative;
      z-index: 10;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    /* Hint text */
 .hint {
      color: #333;
      font-size: 12px;
      margin-top: 40px;
      transition: opacity 0.5s ease;
    }
 .hint.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Name spans for flipping */
 .name-part {
      display: inline-block;
      cursor: pointer;
      transition: transform 0.3s ease;
      user-select: none;
      position: relative;
    }

    /* Flip classes */
 .flip-vertical {
      transform: rotateX(180deg);
    }
 .flip-horizontal {
      transform: rotateY(180deg);
    }

    /* Name fight collision */
 .fight-bounce-left {
      animation: bounceLeft 0.6s ease;
    }
 .fight-bounce-right {
      animation: bounceRight 0.6s ease;
    }
    @keyframes bounceLeft {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-15px) rotateY(180deg); }
    }
    @keyframes bounceRight {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px) rotateY(180deg); }
    }

    /* Ripple effect */
 .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-animation 2s ease-out;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes ripple-animation {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Antigravity button */
 .antigravity-btn {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      color: #333;
      cursor: pointer;
      z-index: 20;
      user-select: none;
    }
 .antigravity-btn:hover {
      color: #555;
    }

    /* Click counter */
 .click-counter {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #333;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
 .click-counter.show {
      opacity: 1;
    }

    /* Rage click message */
 .rage-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #fff;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      animation: fadeInOut 2s ease;
    }
    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      20%, 80% { opacity: 1; }
    }

    /* Screenshot trap */
 .screenshot-trap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #fff;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
    }
 .screenshot-trap.flash {
      animation: screenshotFlash 0.3s ease;
    }
    @keyframes screenshotFlash {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Flyaway letters */
 .letter {
      display: inline-block;
      transition: transform 1s ease, opacity 1s ease;
    }
 .fly-away {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      opacity: 0;
    }

    /* Dance mode */
 .dance {
      animation: danceSpin 0.5s infinite linear;
    }
    @keyframes danceSpin {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.2); }
      50% { transform: rotate(180deg) scale(1); }
      75% { transform: rotate(270deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Gravity fall */
 .gravity-letter {
      position: fixed;
      transition: none;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span class="name-part" data-name="henry">henry</span>
      <span class="name-part" data-name="fransoo">fransoo</span>
    </h1>
    <p>this is my website. i made it because i was bored.</p>

    <p class="hint" id="hint">[ try clicking around the site... ]</p>
  </div>

  <div class="antigravity-btn" id="antigravityBtn">antigravity</div>
  <div class="click-counter" id="clickCounter">clicks: 0</div>
  <div class="screenshot-trap" id="screenshotTrap">i saw that screenshot</div>

  <script>
    // Ripple colors
    const rippleColors = [
      'rgba(0, 120, 255, 0.4)', // blue
      'rgba(255, 220, 0, 0.4)', // yellow
      'rgba(255, 50, 50, 0.4)', // red
      'rgba(50, 220, 50, 0.4)', // green
      'rgba(255, 140, 0, 0.4)' // orange
    ];

    // Click tracking
    let clickCount = 0;
    let totalClicks = 0;
    let lastClickTime = 0;
    let danceModeActive = false;
    let clickStopTimer;
    const rageMessages = ["wow you must be bored", "still here?", "why?"];
    let rageIndex = 0;

    // Elements
    const hint = document.getElementById('hint');
    const clickCounter = document.getElementById('clickCounter');
    const screenshotTrap = document.getElementById('screenshotTrap');

    // Name fight tracking
    let lastNameClick = null;
    let lastNameTime = 0;

    // Idle tracking for flyaway
    let idleTimer;
    let isFlying = false;

    // Gravity tracking
    let gravityActive = false;
    let gravityLetters = [];
    let tiltX = 0, tiltY = 0;

    // Wrap all text in letter spans for flyaway effect - skip.name-part
    function wrapLetters() {
      const elements = document.querySelectorAll('.container h1,.container p');
      elements.forEach(el => {
        if (el.classList.contains('hint')) return;

        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            return node.parentElement.classList.contains('name-part')
         ? NodeFilter.FILTER_REJECT
              : NodeFilter.FILTER_ACCEPT;
          }
        });

        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        textNodes.forEach(node => {
          if (node.textContent.trim() || node.textContent.includes(' ')) {
            const frag = document.createDocumentFragment();
            node.textContent.split('').forEach(char => {
              const span = document.createElement('span');
              span.className = 'letter';
              span.innerHTML = char === ' '? '&nbsp;' : char;
              frag.appendChild(span);
            });
            node.replaceWith(frag);
          }
        });
      });
    }
    wrapLetters();

    // Screenshot trap
    let wasHidden = false;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        wasHidden = true;
      } else if (wasHidden) {
        wasHidden = false;
        screenshotTrap.classList.add('flash');
        setTimeout(() => screenshotTrap.classList.remove('flash'), 300);
      }
    });

    // Reset idle timer
    function resetIdle() {
      clearTimeout(idleTimer);
      if (isFlying || gravityActive) return;
      idleTimer = setTimeout(startFlyaway, 10000);
    }
    ['mousemove', 'keydown', 'click', 'scroll'].forEach(evt => {
      document.addEventListener(evt, resetIdle);
    });
    resetIdle();

    // Flyaway effect
    function startFlyaway() {
      if (isFlying || gravityActive) return;
      isFlying = true;
      const letters = document.querySelectorAll('.letter:not(.gravity-letter)');
      const lettersArray = Array.from(letters);

      lettersArray.forEach((letter, i) => {
        setTimeout(() => {
          const tx = (Math.random() - 0.5) * 800;
          const ty = -Math.random() * 600 - 200;
          const rot = (Math.random() - 0.5) * 720;
          letter.style.setProperty('--tx', tx + 'px');
          letter.style.setProperty('--ty', ty + 'px');
          letter.style.setProperty('--rot', rot + 'deg');
          letter.classList.add('fly-away');
        }, i * 80);
      });

      setTimeout(() => {
        letters.forEach(letter => letter.classList.remove('fly-away'));
        setTimeout(() => {
          isFlying = false;
          resetIdle();
        }, 1000);
      }, lettersArray.length * 80 + 2000);
    }

    // Dance mode handler
    function updateDanceMode() {
      const letters = document.querySelectorAll('.letter:not(.gravity-letter)');
      const now = Date.now();

      if (totalClicks >= 25 && now - lastClickTime < 1500) {
        if (!danceModeActive) {
          danceModeActive = true;
          letters.forEach(letter => letter.classList.add('dance'));
        }
      } else {
        if (danceModeActive) {
          danceModeActive = false;
          letters.forEach(letter => letter.classList.remove('dance'));
        }
      }
    }

    // Click counter visibility
    function updateClickCounter() {
      if (totalClicks >= 25) {
        clickCounter.textContent = `clicks: ${totalClicks}`;
        clickCounter.classList.add('show');
        clearTimeout(clickStopTimer);
        clickStopTimer = setTimeout(() => {
          clickCounter.classList.remove('show');
        }, 2000);
      }
    }

    // Main click handler
    document.body.addEventListener('click', function(e) {
      totalClicks++;
      lastClickTime = Date.now();

      if (totalClicks >= 2) hint.classList.add('hidden');
      updateClickCounter();
      updateDanceMode();

      if (e.target === document.body || e.target.classList.contains('container')) {
        clickCount++;

        if (clickCount % 10 === 0) {
          const msg = document.createElement('div');
          msg.className = 'rage-msg';
          msg.textContent = rageMessages[rageIndex];
          document.body.appendChild(msg);
          rageIndex = (rageIndex + 1) % rageMessages.length;
          setTimeout(() => msg.remove(), 2000);
        }

        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const randomColor = rippleColors[Math.floor(Math.random() * rippleColors.length)];
        ripple.style.background = randomColor;

        const size = Math.max(window.innerWidth, window.innerHeight);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = e.clientX - size / 2 + 'px';
        ripple.style.top = e.clientY - size / 2 + 'px';

        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 2000);
      }
    });

    // Check dance mode stop
    setInterval(() => {
      if (danceModeActive && Date.now() - lastClickTime > 1500) {
        updateDanceMode();
      }
    }, 200);

    // Name flip + fight logic
    const nameParts = document.querySelectorAll('.name-part');
    let isFlipping = false;

    nameParts.forEach(part => {
      part.addEventListener('click', function(e) {
        e.stopPropagation();
        totalClicks++;
        lastClickTime = Date.now();
        if (totalClicks >= 2) hint.classList.add('hidden');
        updateClickCounter();
        updateDanceMode();

        const now = Date.now();
        const name = this.dataset.name;

        if (lastNameClick && lastNameClick!== name && now - lastNameTime < 1000) {
          document.querySelector('[data-name="henry"]').classList.add('fight-bounce-left');
          document.querySelector('[data-name="fransoo"]').classList.add('fight-bounce-right');
          setTimeout(() => {
            document.querySelector('[data-name="henry"]').classList.remove('fight-bounce-left');
            document.querySelector('[data-name="fransoo"]').classList.remove('fight-bounce-right');
          }, 600);
          lastNameClick = null;
          return;
        }

        lastNameClick = name;
        lastNameTime = now;

        if (isFlipping) return;
        isFlipping = true;

        const flipClass = Math.random() > 0.5? 'flip-vertical' : 'flip-horizontal';
        this.classList.add(flipClass);

        setTimeout(() => {
          this.classList.remove(flipClass);
          isFlipping = false;
        }, 5000);
      });
    });

    // Device tilt detection for gravity
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        tiltX = e.gamma || 0; // left-right
        tiltY = e.beta || 0; // front-back
      });
    }

    // Antigravity button - now drops everything
    document.getElementById('antigravityBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      totalClicks++;
      lastClickTime = Date.now();
      if (totalClicks >= 2) hint.classList.add('hidden');
      updateClickCounter();
      updateDanceMode();

      if (gravityActive) return;
      gravityActive = true;

      // Get all letters and convert to absolute positioned falling elements
      const letters = document.querySelectorAll('.letter');
      const container = document.body;

      letters.forEach(letter => {
        const rect = letter.getBoundingClientRect();
        const clone = letter.cloneNode(true);
        clone.classList.add('gravity-letter');
        clone.style.left = rect.left + 'px';
        clone.style.top = rect.top + 'px';
        clone.style.fontSize = window.getComputedStyle(letter).fontSize;
        clone.style.color = window.getComputedStyle(letter).color;
        container.appendChild(clone);
        gravityLetters.push({
          el: clone,
          x: rect.left,
          y: rect.top,
          vx: (Math.random() - 0.5) * 2,
          vy: 0
        });
        letter.style.opacity = '0';
      });

      // Physics animation
      function animateGravity() {
        if (!gravityActive) return;

        gravityLetters.forEach(letter => {
          letter.vy += 0.5; // gravity
          letter.vx += tiltX * 0.01; // tilt influence

          letter.x += letter.vx;
          letter.y += letter.vy;

          // Bounce off bottom
          if (letter.y > window.innerHeight - 20) {
            letter.y = window.innerHeight - 20;
            letter.vy *= -0.6;
            letter.vx *= 0.9;
          }

          // Bounce off sides
          if (letter.x < 0) {
            letter.x = 0;
            letter.vx *= -0.6;
          }
          if (letter.x > window.innerWidth - 20) {
            letter.x = window.innerWidth - 20;
            letter.vx *= -0.6;
          }

          letter.el.style.left = letter.x + 'px';
          letter.el.style.top = letter.y + 'px';
        });

        requestAnimationFrame(animateGravity);
      }
      animateGravity();

      // Reset after 8 seconds
      setTimeout(() => {
        gravityActive = false;
        gravityLetters.forEach(letter => letter.el.remove());
        gravityLetters = [];
        letters.forEach(letter => letter.style.opacity = '1');
      }, 8000);
    });
  </script>
</body>
</html>
